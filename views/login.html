<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/css/output.css" />
  </head>
  <body class="bg-primary">
    <nav
      class="w-full flex items-center justify-between border border-b-border/50 border-0.5 mb-4"
    >
      <div class="flex w-fit items-center sm:ml-32">
        <img src="/icons/logo.png" alt="volt bet" class="w-32 -mr-8" />
        <p class="text-white text-xl font-bold">BetVolt</p>
      </div>
      <div
        class="w-full max-w-[84px] h-[40px] bg-bg sm:w-84 sm:mr-18 cursor-pointer flex items-center justify-center text-white rounded-lg border border-border border-1.5 hover:bg-bg/30 transition duration-250"
      >
        <h3 class="text-font font-bold text-sm">Help</h3>
      </div>
    </nav>
    <div class="flex w-full justify-center">
      <div class="w-full sm:w-fit">
        <div class="w-full mx-auto sm:m-0 sm:max-w-[480px] relative">
          <img
            src="/icons/earth.jpg"
            alt="earth"
            class="relative opacity-50 w-[90%] mx-auto sm:w-[480px] sm:max-w-[480px] h-[192px] rounded-2xl"
          />
          <div
            class="absolute bottom-0 left-0 w-full h-full bg-gradient-to-t from-primary to-transparent"
          >
            <p
              class="text-white font-black text-[25px] sm:text-[35px] absolute bottom-14 left-8 sm:left-4"
            >
              Welcome Back
            </p>
            <p
              class="text-font font-bold text-sm absolute bottom-10 left-8 sm:left-4"
            >
              Access your betting dashboard
            </p>
          </div>
        </div>
        <a href="/auth/google">
          <button
            type="button"
            class="flex justify-center gap-2 items-center w-[90%] mx-auto sm:w-[480px] block mb-2 sm:mb-4 h-14 bg-white/0% text-lg text-white border border-[0.5px] border-border cursor-pointer hover:bg-bg transition duration-200 font-bold mt-4 rounded-xl"
          >
            <img class="w-5" src="/icons/google.png" alt="" />
            <p>Continue With Google</p>
          </button>
        </a>
        <p
          class="flex items-center w-[90%] sm:w-full mb-4 mx-auto sm:mx-0 justify-center gap-2 text-border mt-4 sm:mt-8 before:content-[''] before:block before:h-0.5 before:w-[50%] before:bg-border after:content-[''] after:block after:h-0.5 after:w-[50%] after:bg-border"
        >
          OR
        </p>
        <div class="w-[90%] sm:w-full mx-auto sm:mx-0">
          <form class="w-full" action="/login">
            <label for="email" class="text-white text-xs font-bold block"
              >Email/username</label
            >
            <div class="relative mb-6 mt-2 mx-auto h-14">
              <input
                type="email"
                id="email"
                name="email"
                class="pl-10 placeholder-border bg-input w-full sm:w-[480px] h-14 rounded-xl border border-border border-1"
                placeholder="email@example.com"
              />
              <img
                src="/icons/mail.png"
                class="w-5 top-1/2 left-2 -translate-y-1/2 absolute"
                alt=""
              />
            </div>
            <div class="flex justify-between items-center mt-6">
              <label for="password" class="text-white text-xs font-bold block"
                >Password</label
              >
              <a href="/enteremail">
                <p class="text-font text-xs cursor-pointer">Forgot password?</p>
              </a>
            </div>
            <div class="relative mt-2">
              <input
                type="password"
                id="password"
                name="password"
                class="pl-8 placeholder-border bg-input w-full h-14 rounded-xl border border-border border-1"
                placeholder="••••••••"
              />
              <img
                src="/icons/unlock.png"
                class="w-5 top-1/2 left-2 -translate-y-1/2 absolute"
                alt=""
              />
              <img
                src="/icons/hide.svg"
                id="eyeimg"
                class="w-5 top-1/2 right-4 -translate-y-1/2 absolute"
                alt=""
              />
            </div>
            <div class="flex gap-2 mt-3 ml-1">
              <input type="checkbox" name="rememberme" id="" />
              <p class="text-font text-xs">Remember me for 30 days</p>
            </div>
            <button
              type="submit"
              id="loginBtn"
              class="w-full sm:w-[480px] h-14 bg-button text-lg font-bold mt-3 sm:mt-8 rounded-xl cursor-pointer hover:bg-button/90 hover:shadow-lg hover:shadow-button/30 transition duration-200"
            >
              ENTER NOW
            </button>
            <p id="error" class="text-red-500 text-sm text-center my-4"></p>
          </form>
        </div>
        <div class="flex justify-center w-full">
          <img src="/icons/logo.png" class="w-33" alt="" />
        </div>
      </div>
    </div>
    <script src="/js/eyetoggle.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
