<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join now</title>
    <link rel="stylesheet" href="/public/css/output.css">
</head>
<body class="bg-primary ">
<nav class="w-[100%] flex items-center justify-between border border-b-border/50 border-0.5">

   <div class="flex w-fit gap-0 items-center ml-24">
<img src="/public/icons/logo.png" alt="volt bet" class="w-32 -mr-8">
    <p class="text-white text-xl font-bold ">BetVolt</p>
   </div>
    
   <div class="w-[84px] h-[40px] bg-bg cursor-pointer flex items-center justify-center text-white mr-40 rounded-lg border border-border border-1.5 hover:bg-bg/30 transition duration-250">
    <h3 class="text-font font-bold text-sm ">Help</h3>
   </div>
</nav>
<div class="flex justify-center">
<div>
    <div class="w-fit relative mt-14">
        <img src="/public/icons/earth.jpg" class="w-[480px] h-[192px] rounded-2xl opacity-50" alt="">
    <div class="absolute bottom-0 left-0 w-full h-full  bg-gradient-to-t from-primary to-transparent"></div>
    <p class=" text-white font-black text-[35px] absolute bottom-12 left-6">Create Acount</p>
    <p class=" text-font font-bold text-sm absolute bottom-8 left-8">Join the future of virtual betting</p>
    </div>
    
 <div class="mt-6">
  <form action="/signup" class="w-fit">
    <label for="username" class="text-white text-xs font-bold block">Username</label>
<div class="relative mb-6 mt-2  h-14">
    <input type="text" name="username" class=" pl-10 placeholder-border bg-input w-[480px] h-14 rounded-xl border border-border border-1 " placeholder="Enter your username">
    <img src="/public/icons/user.png" class="w-5 top-1/2 left-2 -translate-y-1/2 absolute" alt="">
</div>
    <label for="email" class="text-white text-xs font-bold block">Email</label>
    <div class="relative mb-6 mt-2  h-14">
    <input type="email" name="email" class=" pl-10 placeholder-border bg-input w-[480px] h-14 rounded-xl border border-border border-1" placeholder="email@example.com">
    <img src="/public/icons/mail.png" class="w-5 top-1/2 left-2 -translate-y-1/2 absolute" alt="">
</div>
    <div class="flex gap-4 mt-4">
      <div>
        <label for="password" class="text-white text-xs font-bold block mt-2">Password</label>
         <div class="relative mt-2">
        <input type="text" name="password" class=" pl-8 placeholder-border bg-input w-[240px] h-14 rounded-xl border border-border border-1" placeholder="••••••••">
        <img src="/public/icons/unlock.png" class="w-5 top-1/2 left-2 -translate-y-1/2 absolute" alt="">

      </div>
      </div>
      <div>
        <label for="confirmpassword" class="text-white text-xs font-bold mt-2 block">Confirm Password</label>
          <div class="relative mt-2">
        <input type="text" name="confirmpassword" class=" pl-8 placeholder-border bg-input w-[240px] h-14 rounded-xl border border-border border-1" placeholder="••••••••">
        <img src="/public/icons/armor.png" class="w-5 top-1/2 left-2 -translate-y-1/2 absolute" alt="">
      </div>
      </div>
    </div>
    <button type="submit" class="w-[480px] h-14 bg-button text-lg font-bold mt-8 rounded-xl cursor-pointer hover:bg-button/90 hover:shadow-lg hover:shadow-button/30 transition duration-200">CREATE ACCOUNT</button>
  </form>
 
  <p class="flex items-center justify-center gap-2 text-border mt-8 before:content-[''] before:block before:h-0.5 before:w-[50%] before:bg-border after:content-[''] after:block after:h-0.5 after:w-[50%] after:bg-border">
    OR
  </p>
  <button type="button" class="flex justify-center gap-2 items-center w-[480px] block mb-4 h-14 bg-white/0% text-lg text-white border border-[0.5px] border-border cursor-pointer hover:bg-bg transition duration-200 font-bold mt-8 rounded-xl">
    <img class="w-5" src="/public/icons/google.png" alt="">
    <p> Sign Up With Google</p>
  </button>
  <div class="flex justify-center gap-2">
    <span class="items-center text-[#94A3B8]">Already have an account?</span> 
<span class="text-font">Login here</span>
  </div>

   </div>
</div>
</body>
</html>
