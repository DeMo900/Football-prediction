<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join now</title>
    <link rel="stylesheet" href="/css/output.css">
</head>
<body class="bg-primary ">
<nav class="w-full flex items-center justify-between border border-b-border/50 border-0.5 ">

   <div class="flex w-fit items-center  sm:ml-32 ">
<img src="/icons/logo.png" alt="volt bet" class="w-32 -mr-8">
    <p class="text-white text-xl font-bold ">BetVolt</p>
   </div>
    
   <div class="w-full max-w-[84px] h-[40px] bg-bg sm:w-84 sm:mr-18 cursor-pointer flex items-center justify-center text-white  rounded-lg border border-border border-1.5 hover:bg-bg/30 transition duration-250">
    <h3 class="text-font font-bold text-sm ">Help</h3>
   </div>
</nav>
<div class="flex w-full justify-center">
<div class="w-full sm:max-w-[480px]  ">
    <div class="w-full relative sm:mt-14 ">
        <img src="/icons/earth.jpg" class="w-full max-w-[480px] sm:w-[480px] h-[192px] rounded-2xl opacity-50 " alt="">
    <div class="absolute bottom-0 left-0 w-full h-full  bg-gradient-to-t from-primary to-transparent"></div>
    <p class=" text-white font-black text-[25px] sm:text-[35px] absolute bottom-10 left-2 sm:left-6">Create Acount</p>
    <p class=" text-font font-bold text-sm absolute bottom-6 left-2 sm:left-8">Join the future of virtual betting</p>
    </div>
    
 <div class="sm:mt-6 ml-2 sm:ml-0 w-full ">
  <form action="/signup" class="w-full">
    <label for="username" class="text-white  text-xs font-bold block">Username</label>
<div class="relative mb-6 mt-2  w-[470px] sm:w-[480px] h-14">
    <input type="text" id="username" name="username" class=" pl-10 placeholder-border bg-input  w-[390px] sm:w-[480px] h-14 rounded-xl border border-border border-1 " placeholder="Enter your username">
    <img src="/icons/user.png" class="w-5 top-1/2 left-2 -translate-y-1/2 absolute" alt="">
</div>
    <label for="email" class="text-white text-xs font-bold block">Email</label>
    <div class="relative mb-6 mt-2  h-14">
    <input type="email" id="email" name="email" class=" pl-10 placeholder-border bg-input w-[390px] sm:w-[480px] h-14 rounded-xl border border-border border-1" placeholder="email@example.com">
    <img src="/icons/mail.png" class="w-5 top-1/2 left-2 -translate-y-1/2 absolute" alt="">
</div>
    <div class="flex gap-4 mt-4">
      <div>
        <label for="password" class="text-white text-xs font-bold block mt-2">Password</label>
         <div class="relative mt-2">
        <input type="password" name="password" id="password" class=" pl-8 placeholder-border bg-input w-[180px] sm:w-[240px] h-14 rounded-xl border border-border border-1" placeholder="••••••••">
        <img src="/icons/unlock.png" class="w-5 top-1/2 left-2 -translate-y-1/2 absolute" alt="">
        <img src="/icons/hide.svg" id="eyeimg" class="w-5 top-1/2 right-4 -translate-y-1/2 absolute" alt="">
      </div>
      </div>
      <div>
        <label for="confirmpassword" class="text-white text-xs font-bold mt-2 block">Confirm Password</label>
          <div class="relative mt-2">
        <input type="text" name="confirmPassword" id="cpassword" class=" pl-8 placeholder-border bg-input  w-[180px] sm:w-[240px] h-14 rounded-xl border border-border border-1" placeholder="••••••••">
        <img src="/icons/armor.png" class="w-5 top-1/2 left-2 -translate-y-1/2 absolute" alt="">
        <img src="/icons/hide.svg" id="ceyeimg" class="w-5 top-1/2 right-4 -translate-y-1/2 absolute" alt="">

      </div>
      </div>
    </div>
    <p id="errorMsg" class="text-red-500 text-sm mt-3 text-center sm:w-[480px]"></p>
    <button type="submit" id="signupBtn" class=" w-full sm:w-[480px] h-14 bg-button text-lg font-bold mt-3 sm:mt-8 rounded-xl cursor-pointer hover:bg-button/90 hover:shadow-lg hover:shadow-button/30 transition duration-200">CREATE ACCOUNT</button>
  </form>
 
  <p class="flex items-center justify-center gap-2 text-border mt-4 sm:mt-8 before:content-[''] before:block before:h-0.5 before:w-[50%] before:bg-border after:content-[''] after:block after:h-0.5 after:w-[50%] after:bg-border">
    OR
  </p>
  <a href="/auth/google">
  <button type="button" class="flex justify-center gap-2 items-center w-full sm:w-[480px] block sm:mb-2 h-14 bg-white/0% text-lg text-white border border-[0.5px] border-border cursor-pointer hover:bg-bg transition duration-200 font-bold mt-2 rounded-xl">
    <img class="w-5" src="/icons/google.png" alt="">
    <p> Sign Up With Google</p>
  </button>
  </a>
  <div class="flex justify-center gap-2">
    <span class="items-center text-[#94A3B8]">Already have an account?</span> 
    <a href="/login">
<span class="text-font cursor-pointer">Login here</span>
</a>
  </div>

   </div>
</div>
<script src="/js/eyetoggle.js"></script>
<script src="/js/signup.js"></script>
</body>
</html>
