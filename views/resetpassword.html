<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Password</title>
    <link rel="stylesheet" href="/css/output.css" />
  </head>
  <body class="bg-primary">
    <nav
      class="w-full flex items-center justify-between border border-b-border/50 border-0.5 mb-4"
    >
      <div class="flex w-fit items-center sm:ml-32">
        <img src="/icons/logo.png" alt="volt bet" class="w-32 -mr-8" />
        <p class="text-white text-xl font-bold">BetVolt</p>
      </div>
      <div
        class="w-full max-w-[84px] h-[40px] bg-bg sm:w-84 sm:mr-18 cursor-pointer flex items-center justify-center text-white rounded-lg border border-border border-1.5 hover:bg-bg/30 transition duration-250"
      >
        <h3 class="text-font font-bold text-sm">Help</h3>
      </div>
    </nav>

    <div class="flex w-full justify-center mt-16">
      <div class="w-full sm:w-fit">
        <div class="w-[90%] sm:w-[480px] mx-auto">
          <p class="text-white font-black text-[28px] sm:text-[35px]">
            Create a password
          </p>
          <p class="text-font font-bold text-sm mt-1">
            Choose a strong password for your account
          </p>
        </div>

        <div class="w-[90%] sm:w-[480px] mx-auto mt-8">
          <form class="w-full" action="/signup/password">
            <label for="password" class="text-white text-xs font-bold block"
              >Password</label
            >
            <div class="relative mt-2 h-14">
              <input
                type="password"
                name="password"
                id="password"
                class="pl-10 placeholder-border bg-input w-full h-14 rounded-xl border border-border border-1"
                placeholder="••••••••"
              />
              <img
                src="/icons/unlock.png"
                class="w-5 top-1/2 left-2 -translate-y-1/2 absolute"
                alt=""
              />
              <img
                src="/icons/hide.svg"
                class="w-5 top-1/2 right-4 -translate-y-1/2 absolute"
                id="eyeimg"
                alt=""
              />
            </div>
            <p id="messageBox" class="text-sm mt-3 text-center"></p>
            <button
              type="submit"
              id="updateBtn"
              class="w-full h-14 bg-button text-lg font-bold mt-8 rounded-xl cursor-pointer hover:bg-button/90 hover:shadow-lg hover:shadow-button/30 transition duration-200"
            >
              CONTINUE
            </button>
          </form>
        </div>

        <div class="flex justify-center w-full mt-8">
          <img src="/icons/logo.png" class="w-33" alt="" />
        </div>
      </div>
    </div>
    <script src="/js/eyetoggle.js"></script>
    <script src="/js/updatepassword.js"></script>
  </body>
</html>
