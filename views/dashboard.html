<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashBoard</title>
    <link rel="stylesheet" href="/public/css/output.css">
</head>

<body>
    <nav
        class="w-full flex items-center bg-[#060E06]  h-20 justify-between border border-b-border/50 border-0.5 fixed top-0 z-50 ">
        <div class="flex w-fit items-center">
            <img src="/public/icons/logo.png" alt="volt bet" class="w-26">
            <ul class="flex gap-8 sm:ml-10">
                <li
                    class="text-dashboardfont font-sans text-sm hover:text-font cursor-pointer transition duration-200 ">
                    Live</li>
                <li
                    class="text-dashboardfont font-sans text-sm hover:text-font cursor-pointer transition duration-200 ">
                    Schedule</li>
                <li
                    class="text-dashboardfont font-sans text-sm hover:text-font cursor-pointer transition duration-200 ">
                    Results</li>
                <li
                    class="text-dashboardfont font-sans text-sm hover:text-font cursor-pointer transition duration-200 ">
                    Leaderboard </li>
            </ul>
        </div>

        <div class="flex items-center gap-4 sm:mr-18">
            <div class="rounded-3xl bg-[#192219] p-2 px-8 shadow-[0_0_3px_#36f71d]">
                <h4 class="text-font text-xs font-bold">500 Coins</h4>
            </div>
            <img src="/public/icons/profile.svg" alt="profile" class="w-8">
        </div>

    </nav>

    <div class=" w-full h-screen grid grid-cols-[1fr_3fr_1fr] mt-20 ">
        <div class="bg-dbPrimary  opacity-99 pt-10">
            <p class="text-dashboardfont font-thin text-sm pl-8">Leagues</p>
            <div class="w-full">
                <ul class="w-full">
                    <li class="text-dashboardfont font-sans text-sm h-12 w-full flex items-center gap-2 pl-4 cursor-pointer hover:bg-white/5 transition duration-200 hover:border-l-4 hover:border-font">
                        <img src="/public/icons/ball.svg" alt="ball">
                        <p>Serie A </p>
                    </li>
                </ul>
            </div>
        </div>

        <div class="bg-[#060F06] pt-16 overflow-y-auto">
            <h1 class="text-dashboardfont ml-10 -mt-10 mb-4 text-2xl font-bold flex items-center gap-2">
                <div class="w-3 h-3 bg-font rounded-full shadow-[0_0_8px_#36f71d] animate-pulse"></div>
                LIVE MATCHES
            </h1>

            <div class="w-full h-full grid grid-cols-1 gap-4 ">
                <div class="w-[90%] mx-auto rounded-xl flex h-80 bg-dbPrimary">
                    
                </div>
                  <div class="w-[90%] mx-auto rounded-xl flex h-80 bg-dbPrimary">
                    
                </div>
                   <div class="w-[90%] mx-auto rounded-xl flex h-80 bg-dbPrimary">
                    
                </div>
            </div>  
        </div>

        <div class="bg-dbPrimary pt-24"></div>

    </div>
</body>

</html>
